name: Sphinx Documentation

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  docs:
    name: Generate Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
            python-version: '3.12'

      - name: Install Ubuntu Dependencies
        run: |
          sudo apt install pandoc liblapack3 libglut3.12 libglu1-mesa libfreetype6 fonts-ubuntu
          cd /usr/lib/x86_64-linux-gnu/ && sudo ln -s libglut.so.3.12 libglut.so.3

      - name: Install Python Dependencies
        run: |
          pip install sphinx furo myst_parser nbsphinx robotic numpy
          pip install -e .

      - name: Sphinx build
        run: |
          sphinx-build docs html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: html
